<!DOCTYPE html>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #0f172a; color: #e2e8f0;
    min-height: 100vh; padding: 24px 16px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 800; color: #E8A020; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #64748b; margin-bottom: 20px; }
  .card {
    background: #1e293b; border: 1px solid #334155;
    border-radius: 14px; padding: 18px; margin-bottom: 14px;
  }
  .card h3 {
    font-size: 13px; font-weight: 700; color: #E8A020;
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .item-row {
    display: flex; justify-content: space-between;
    align-items: center; padding: 5px 0;
    border-bottom: 1px solid #1e3a5f;
    font-size: 13px;
  }
  .item-row:last-child { border-bottom: none; }
  .item-name { color: #e2e8f0; display: flex; align-items: center; gap: 6px; }
  .item-price { color: #E8A020; font-weight: 700; font-size: 12px; }
  .inp {
    width: 100%; padding: 12px 14px;
    background: #0f172a; border: 1.5px solid #334155;
    border-radius: 8px; color: #e2e8f0;
    font-size: 14px; outline: none; margin-bottom: 10px;
  }
  .inp:focus { border-color: #E8A020; }
  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #E8A020, #C07A10);
    color: #fff; font-size: 15px; font-weight: 800;
    border: none; border-radius: 10px;
    cursor: pointer; margin-bottom: 12px;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .err { color: #ef4444; background: rgba(239,68,68,.1); border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-top: 8px; display: none; }
  .ok  { color: #22c55e; background: rgba(34,197,94,.1);  border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-top: 8px; display: none; }
  .log { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 14px; font-size: 12px; font-family: monospace; max-height: 260px; overflow-y: auto; margin-top: 12px; display: none; }
  .l-ok  { color: #22c55e; margin-bottom: 2px; }
  .l-err { color: #ef4444; margin-bottom: 2px; }
  .l-inf { color: #94a3b8; margin-bottom: 2px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat  { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; text-align: center; }
  .stat-n { font-size: 26px; font-weight: 800; color: #E8A020; }
  .stat-l { font-size: 11px; color: #64748b; }
  #seed-section { display: none; }
  .done { background: #052e16; border: 1px solid #16a34a; border-radius: 12px; padding: 16px; text-align: center; display: none; margin-top: 12px; }
  .done h2 { color: #22c55e; margin-bottom: 6px; }
  .done p  { color: #86efac; font-size: 13px; }
  .user-info { display: none; background: #052e16; border: 1px solid #16a34a; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #86efac; margin-bottom: 16px; }
</style>

// Category icons
const CAT_ICONS = {
  "Ice Cream":   "🍦",
  "Patties":     "🥙",

  "Cake":        "🎂",
  "Combos":      "🎁",
};

document.getElementById('total-n').textContent = MENU.length;

// Render preview
function renderPreview() {
  const cats = {};
  MENU.forEach(item => {
    if (!cats[item.cat]) cats[item.cat] = [];
    cats[item.cat].push(item);
  });
  const prev = document.getElementById('preview');
  prev.innerHTML = '';
  Object.entries(cats).forEach(([cat, items]) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${CAT_ICONS[cat] || '🍽️'} ${cat} (${items.length})</h3>` +
      items.map(it =>
        `<div class="item-row">
          <span class="item-name">${it.icon} ${it.name}</span>
          <span class="item-price">₹${it.price}</span>
        </div>`
      ).join('');
    prev.appendChild(card);
  });
}

function log(msg, type='inf') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  const d = document.createElement('div');
  d.className = `l-${type}`;
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

// LOGIN
window.doLogin = async function() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value.trim();
  const errEl = document.getElementById('login-err');
  const okEl  = document.getElementById('login-ok');
  errEl.style.display = 'none'; okEl.style.display = 'none';

  if (!email || !pass) {
    errEl.textContent = 'Email aur password dono daalo!';
    errEl.style.display = 'block'; return;
  }
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    okEl.textContent = `Logged in: ${cred.user.email}`;
    okEl.style.display = 'block';
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('seed-section').style.display  = 'block';
    const info = document.getElementById('user-info');
    info.textContent = `Admin: ${cred.user.email}`;
    info.style.display = 'block';
    renderPreview();
  } catch(e) {
    let msg = 'Login fail hua.';
    if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
      msg = 'Email ya password galat hai!';
    errEl.textContent = msg; errEl.style.display = 'block';
  }
};

// SEED
window.startSeed = async function() {
  const btn = document.getElementById('seed-btn');
  btn.disabled = true; btn.textContent = 'Adding...';

  try {
    log('Purana menu clear kar raha hoon...', 'inf');
    const snap = await getDocs(collection(db, 'menu'));
    for (const d of snap.docs) await deleteDoc(d.ref);
    log(`${snap.size} purane items delete kiye`, 'inf');

    let done = 0;
    for (const item of MENU) {
      const id = item.name.toLowerCase()
        .replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
      await setDoc(doc(db,'menu',id), {
        name:      item.name,
        category:  item.cat,
        icon:      item.icon,
        price:     item.price,
        veg:       true,
        available: true,
        addedAt:   new Date().toISOString(),
      });
      done++;
      document.getElementById('done-count').textContent = done;
      log(`${item.icon} ${item.name} — Rs.${item.price}`, 'ok');
    }
    log(`Done! ${done} items added!`, 'ok');
    document.getElementById('done-banner').style.display = 'block';
    btn.textContent = 'Done!';
  } catch(e) {
    log(`Error: ${e.message}`, 'err');
    btn.disabled = false;
    btn.textContent = 'Dobara Try Karo';
  }
};
