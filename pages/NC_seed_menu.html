<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<title>Neel's Cafe — Menu Seed</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #0f172a; color: #e2e8f0;
    min-height: 100vh; padding: 24px 16px;
  }
  .wrap { max-width: 600px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 800; color: #E8A020; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #64748b; margin-bottom: 20px; }
  .card {
    background: #1e293b; border: 1px solid #334155;
    border-radius: 14px; padding: 20px; margin-bottom: 16px;
  }
  .card h3 { font-size: 13px; font-weight: 700; color: #E8A020; margin-bottom: 12px; }
  .inp {
    width: 100%; padding: 12px 14px;
    background: #0f172a; border: 1.5px solid #334155;
    border-radius: 8px; color: #e2e8f0;
    font-size: 14px; outline: none; margin-bottom: 10px;
  }
  .inp:focus { border-color: #E8A020; }
  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #E8A020, #C07A10);
    color: #fff; font-size: 15px; font-weight: 800;
    border: none; border-radius: 10px;
    cursor: pointer; transition: opacity .2s;
  }
  .btn:hover { opacity: .9; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .err {
    color: #ef4444; background: rgba(239,68,68,.1);
    border-radius: 8px; padding: 10px 12px;
    font-size: 13px; margin-top: 8px; display: none;
  }
  .ok {
    color: #22c55e; background: rgba(34,197,94,.1);
    border-radius: 8px; padding: 10px 12px;
    font-size: 13px; margin-top: 8px; display: none;
  }
  .log {
    background: #0f172a; border: 1px solid #334155;
    border-radius: 10px; padding: 14px;
    font-size: 12px; font-family: monospace;
    max-height: 280px; overflow-y: auto;
    margin-top: 12px; display: none;
  }
  .l-ok  { color: #22c55e; margin-bottom: 2px; }
  .l-err { color: #ef4444; margin-bottom: 2px; }
  .l-inf { color: #94a3b8; margin-bottom: 2px; }
  .stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 16px;
  }
  .stat {
    background: #0f172a; border: 1px solid #334155;
    border-radius: 8px; padding: 12px; text-align: center;
  }
  .stat-n { font-size: 24px; font-weight: 800; color: #E8A020; }
  .stat-l { font-size: 11px; color: #64748b; }
  #seed-section { display: none; }
  .done {
    background: #052e16; border: 1px solid #16a34a;
    border-radius: 12px; padding: 16px; text-align: center;
    display: none; margin-top: 12px;
  }
  .done h2 { color: #22c55e; margin-bottom: 6px; }
  .done p  { color: #86efac; font-size: 13px; }
  .user-info {
    display: none;
    background: #052e16; border: 1px solid #16a34a;
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; color: #86efac; margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="wrap">

  <h1>👨‍🍳 Neel's Cafe — Menu Seed</h1>
  <p class="sub">Pehle admin login karo, phir menu add hoga</p>

  <!-- LOGIN SECTION -->
  <div class="card" id="login-section">
    <h3>🔐 Admin Login</h3>
    <input class="inp" type="email" id="email"
      placeholder="vishtechsoftwareservices@gmail.com"
      value="vishtechsoftwareservices@gmail.com"/>
    <input class="inp" type="password" id="password"
      placeholder="Password"/>
    <button class="btn" onclick="doLogin()">Login Karo</button>
    <div class="err" id="login-err"></div>
    <div class="ok"  id="login-ok"></div>
  </div>

  <!-- SEED SECTION -->
  <div id="seed-section">

    <div class="user-info" id="user-info"></div>

    <div class="stats">
      <div class="stat">
        <div class="stat-n">78</div>
        <div class="stat-l">Total Items</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="done-count">0</div>
        <div class="stat-l">Added</div>
      </div>
    </div>

    <button class="btn" id="seed-btn" onclick="startSeed()">
      🚀 Poora Menu Add Karo
    </button>

    <div class="log" id="log"></div>
    <div class="done" id="done-banner">
      <h2>✅ Menu Add Ho Gaya!</h2>
      <p>78 items Firebase mein save ho gaye.<br/>
      Admin Panel → Menu mein dekho.</p>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp, getApps, getApp }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, doc, setDoc, getDocs, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import {
  getAuth, signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const CFG = {
  apiKey:            "AIzaSyCIsYsizR3Cv_xXrHFyhW2dP0J_SwR91Pc",
  authDomain:        "neels-cafe.firebaseapp.com",
  projectId:         "neels-cafe",
  storageBucket:     "neels-cafe.firebasestorage.app",
  messagingSenderId: "327739901498",
  appId:             "1:327739901498:web:0dd6e83a8ea29c8a31d703"
};

const app  = getApps().length ? getApp() : initializeApp(CFG);
const db   = getFirestore(app);
const auth = getAuth(app);

// ── MENU DATA ──────────────────────────────────────────────
const MENU = [
  // ICE CREAM
  {name:"Vanilla Ice Cream",      cat:"Ice Cream",  price:30},
  {name:"Strawberry Ice Cream",   cat:"Ice Cream",  price:30},
  {name:"Butterscotch Ice Cream", cat:"Ice Cream",  price:40},
  {name:"Chocolate Ice Cream",    cat:"Ice Cream",  price:40},
  {name:"Mango Ice Cream",        cat:"Ice Cream",  price:40},
  {name:"Pineapple Ice Cream",    cat:"Ice Cream",  price:40},
  {name:"Kesar Pista Ice Cream",  cat:"Ice Cream",  price:40},
  {name:"Raj Bhog Ice Cream",     cat:"Ice Cream",  price:50},
  // PATTIES
  {name:"Aloo Patties",           cat:"Patties",    price:30},
  {name:"Mayonnaise Patties",     cat:"Patties",    price:40},
  {name:"Cheese Patties",         cat:"Patties",    price:50},

  {name:"Bhel Puri",              cat:"Chaat Items",price:50},

  {name:"Red Pasta",              cat:"Pasta",      price:100},

  {name:"Mix Pasta",              cat:"Pasta",      price:140},
  // HOT DRINKS
  {name:"Chai",                   cat:"Hot Drinks", price:20},
  {name:"Special Chai",           cat:"Hot Drinks", price:25},
  {name:"Kulhad Chai",            cat:"Hot Drinks", price:30},
  {name:"Hot Coffee",             cat:"Hot Drinks", price:50},
  // PIZZA
  {name:"OTC Pizza",              cat:"Pizza",      price:120},
  {name:"Cheese Pizza",           cat:"Pizza",      price:150},
  {name:"Double Cheese Pizza",    cat:"Pizza",      price:200},
  {name:"Paneer Stuff Pizza",     cat:"Pizza",      price:250},
  {name:"Onion Corn Pizza",       cat:"Pizza",      price:270},
  // BURGER
  {name:"Aloo Tikki Burger",      cat:"Burger",     price:50},

  // SANDWICH
  {name:"Veg Grill Sandwich",     cat:"Sandwich",   price:50},
  {name:"Mayonnaise Grill",       cat:"Sandwich",   price:60},
  {name:"Cheese Grill",           cat:"Sandwich",   price:70},
  {name:"Tandoori Grill",         cat:"Sandwich",   price:80},
  {name:"Paneer Grill",           cat:"Sandwich",   price:80},
  {name:"Jumbo Cheese Grill",     cat:"Sandwich",   price:100},
  // MOMOS
  {name:"Steam Momos",            cat:"Momos",      price:60},

  // COFFEE
  {name:"Cold Coffee",            cat:"Coffee",     price:80},

  // CAKE
  {name:"Cake",                   cat:"Cake",       price:350},
  {name:"Pastry Dark Chocolate",  cat:"Cake",       price:70},
  {name:"Cream Roll",             cat:"Cake",       price:30},
  // COMBOS
  {name:"2 Cheese Burger + 2 Cold Coffee",          cat:"Combos", price:280},
  {name:"1 Cheese Pizza + 1 Cold Coffee",           cat:"Combos", price:200},
  {name:"2 Cheese Grill + 2 Cold Coffee",           cat:"Combos", price:280},
  {name:"1 Double Cheese Pizza + 1 Cold Coffee",    cat:"Combos", price:280},
  {name:"Family: 2 Cheese Pizza + 4 Cold Coffee",   cat:"Combos", price:550},
  {name:"Family: 4 Cheese Grill + 4 Cold Coffee",   cat:"Combos", price:550},
  {name:"Birthday Special Combo",                   cat:"Combos", price:1000},
];

function log(msg, type='inf') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  const d = document.createElement('div');
  d.className = `l-${type}`;
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}

// ── LOGIN ──────────────────────────────────────────────────
window.doLogin = async function() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value.trim();
  const errEl = document.getElementById('login-err');
  const okEl  = document.getElementById('login-ok');
  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if (!email || !pass) {
    showErr('login-err', 'Email aur password dono daalo!');
    return;
  }

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    okEl.textContent = `✅ Login successful: ${cred.user.email}`;
    okEl.style.display = 'block';

    document.getElementById('login-section').style.display = 'none';
    document.getElementById('seed-section').style.display  = 'block';
    const info = document.getElementById('user-info');
    info.textContent = `✅ Logged in: ${cred.user.email}`;
    info.style.display = 'block';

  } catch(e) {
    let msg = 'Login fail hua.';
    if (e.code === 'auth/wrong-password')   msg = '❌ Galat password!';
    if (e.code === 'auth/user-not-found')   msg = '❌ Email registered nahi hai!';
    if (e.code === 'auth/invalid-email')    msg = '❌ Email format galat hai!';
    if (e.code === 'auth/invalid-credential') msg = '❌ Email ya password galat hai!';
    showErr('login-err', msg);
  }
};

// ── SEED ───────────────────────────────────────────────────
window.startSeed = async function() {
  const btn = document.getElementById('seed-btn');
  btn.disabled = true; btn.textContent = '⏳ Adding...';

  try {
    log('Purana menu clear kar raha hoon...', 'inf');
    const snap = await getDocs(collection(db, 'menu'));
    for (const d of snap.docs) await deleteDoc(d.ref);
    log(`${snap.size} purane items delete kiye`, 'inf');

    let done = 0;
    for (const item of MENU) {
      const id = item.name.toLowerCase()
        .replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');

      await setDoc(doc(db,'menu',id), {
        name:      item.name,
        category:  item.cat,
        price:     item.price,
        veg:       true,
        available: true,
        addedAt:   new Date().toISOString(),
      });

      done++;
      document.getElementById('done-count').textContent = done;
      log(`✅ ${item.name} — ₹${item.price}`, 'ok');
    }

    log(`\n🎉 ${done} items added!`, 'ok');
    document.getElementById('done-banner').style.display = 'block';
    btn.textContent = '✅ Done!';

  } catch(e) {
    log(`❌ Error: ${e.message}`, 'err');
    btn.disabled = false;
    btn.textContent = '🔄 Dobara Try Karo';
  }
};
</script>
</body>
</html>
